services:

  app-sql:
    image: ghcr.io/atharva-phatak/object-detection:latest
    pull_policy: always
    command: >
      sh -c "alembic upgrade head &&
             python -m counter.entrypoints.webapp"
    ports:
      - "5001:5000"
    environment:
      - PYTHONPATH=.
      - ENV=sql
      - DB_USER=${DB_USER:-counter}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=object_counts
      - TFS_HOST=tfserving
      - TFS_PORT=8501
    depends_on:
      mysql:
        condition: service_healthy
      tfserving:
        condition: service_started
    profiles: ["sql"]

  app-prod:
    image: ghcr.io/atharva-phatak/object-detection:latest
    pull_policy: always
    ports:
      - "5001:5000"
    environment:
      - PYTHONPATH=.
      - ENV=prod
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=prod_counter
      - TFS_HOST=tfserving    # this was missing
      - TFS_PORT=8501
    depends_on:
      mongo:
        condition: service_healthy
      tfserving:
        condition: service_started
    profiles: ["prod"]

  tfserving:
    image: tensorflow/serving
    pull_policy: missing
    ports:
      - "8501:8501"
    volumes:
      - ./tmp/model:/models
    environment:
      - MODEL_NAME=ssd_mobilenet_v2

  mongo:
    image: mongo:latest
    pull_policy: missing
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod"]

  mysql:
    image: mysql:8.0
    pull_policy: missing
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_DATABASE=object_counts
      - MYSQL_USER=${DB_USER:-counter}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["sql"]

  test:
    image: ghcr.io/<your-github-username>/object-detection:latest
    command: >
      sh -c "uv run pytest -m integration --cov=counter --cov-report=term-missing"
    environment:
      - PYTHONPATH=.
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=object_counts
      - DB_USER=${DB_USER:-counter}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=test_counter
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    profiles: ["test"]

volumes:
  mongo_data:
  mysql_data:
